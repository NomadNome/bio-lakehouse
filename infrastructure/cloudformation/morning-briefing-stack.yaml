AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bio-Optimization Data Lakehouse - Morning Briefing
  Lambda function and SNS topic for a concise morning health summary email.
  Invoked by run_daily_ingestion.sh after the Gold layer refreshes (event-driven).

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  ProjectPrefix:
    Type: String
    Default: bio-lakehouse
  NotificationEmail:
    Type: String
    Description: Email address for morning briefing delivery
    Default: ''

Conditions:
  HasEmail: !Not [!Equals [!Ref NotificationEmail, '']]

Resources:

  # -------------------------------------------------------
  # SNS Topic - Morning Briefing
  # -------------------------------------------------------
  MorningBriefingTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${ProjectPrefix}-morning-briefing'
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix

  MorningBriefingSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      TopicArn: !Ref MorningBriefingTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # -------------------------------------------------------
  # IAM Role - Morning Briefing Lambda
  # -------------------------------------------------------
  MorningBriefingLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-morning-briefing-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: !Sub '${ProjectPrefix}-morning-briefing-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Athena query execution
              - Effect: Allow
                Action:
                  - 'athena:StartQueryExecution'
                  - 'athena:GetQueryExecution'
                  - 'athena:GetQueryResults'
                Resource: '*'
              # S3 access for Athena results and Gold bucket
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-athena-results-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-athena-results-${AWS::AccountId}/*'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-gold-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-gold-${AWS::AccountId}/*'
              # Glue catalog (for Athena table lookups)
              - Effect: Allow
                Action:
                  - 'glue:GetDatabase'
                  - 'glue:GetTable'
                  - 'glue:GetTables'
                  - 'glue:GetPartitions'
                Resource: '*'
              # SNS publish
              - Effect: Allow
                Action:
                  - 'sns:Publish'
                Resource: !Ref MorningBriefingTopic
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix

  # -------------------------------------------------------
  # Lambda Function - Morning Briefing
  # -------------------------------------------------------
  MorningBriefingFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-morning-briefing'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt MorningBriefingLambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Sub '${ProjectPrefix}-gold-${AWS::AccountId}'
        S3Key: lambda/morning_briefing.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MorningBriefingTopic
          ATHENA_DATABASE: bio_gold
          ATHENA_RESULTS_BUCKET: !Sub '${ProjectPrefix}-athena-results-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix

Outputs:
  MorningBriefingTopicArn:
    Description: SNS topic ARN for morning briefing
    Value: !Ref MorningBriefingTopic
    Export:
      Name: !Sub '${ProjectPrefix}-morning-briefing-topic'

  MorningBriefingLambdaArn:
    Description: Morning briefing Lambda function ARN
    Value: !GetAtt MorningBriefingFunction.Arn
