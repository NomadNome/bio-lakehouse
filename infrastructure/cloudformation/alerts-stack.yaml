AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bio-Optimization Data Lakehouse - Health Alerts
  SNS topic, Lambda function, and EventBridge daily schedule for health alerts.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  ProjectPrefix:
    Type: String
    Default: bio-lakehouse
  AlertSnsTopicArn:
    Type: String
    Description: ARN of the existing SNS topic for health alerts
    Default: ''

Resources:

  # -------------------------------------------------------
  # IAM Role - Health Alerts Lambda
  # -------------------------------------------------------
  HealthAlertsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectPrefix}-health-alerts-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: !Sub '${ProjectPrefix}-health-alerts-policy'
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Athena query execution
              - Effect: Allow
                Action:
                  - 'athena:StartQueryExecution'
                  - 'athena:GetQueryExecution'
                  - 'athena:GetQueryResults'
                Resource: '*'
              # S3 access for Athena results and Gold bucket
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                Resource:
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-athena-results-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-athena-results-${AWS::AccountId}/*'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-gold-${AWS::AccountId}'
                  - !Sub 'arn:aws:s3:::${ProjectPrefix}-gold-${AWS::AccountId}/*'
              # Glue catalog (for Athena table lookups)
              - Effect: Allow
                Action:
                  - 'glue:GetDatabase'
                  - 'glue:GetTable'
                  - 'glue:GetTables'
                  - 'glue:GetPartitions'
                Resource: '*'
              # SNS publish
              - Effect: Allow
                Action:
                  - 'sns:Publish'
                Resource: !Ref AlertSnsTopicArn
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix

  # -------------------------------------------------------
  # Lambda Function - Health Alerts
  # -------------------------------------------------------
  HealthAlertsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectPrefix}-health-alerts'
      Runtime: python3.11
      Handler: handler.lambda_handler
      Role: !GetAtt HealthAlertsLambdaRole.Arn
      Timeout: 120
      MemorySize: 256
      Code:
        S3Bucket: !Sub '${ProjectPrefix}-gold-${AWS::AccountId}'
        S3Key: lambda/health_alerts.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref AlertSnsTopicArn
          ATHENA_DATABASE: bio_gold
          ATHENA_RESULTS_BUCKET: !Sub '${ProjectPrefix}-athena-results-${AWS::AccountId}'
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix

  # -------------------------------------------------------
  # EventBridge Rule - Fire after Gold refresh succeeds
  # -------------------------------------------------------
  GoldRefreshHealthAlertsRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectPrefix}-health-alerts-after-gold'
      Description: Triggers health alerts after Gold layer refresh succeeds (freshest data)
      EventPattern:
        source: ["aws.glue"]
        detail-type: ["Glue Job State Change"]
        detail:
          jobName:
            - !Sub '${ProjectPrefix}-readiness-aggregator'
            - !Sub '${ProjectPrefix}-dbt-gold-refresh'
          state: ["SUCCEEDED"]
      State: ENABLED
      Targets:
        - Id: HealthAlertsLambdaTarget
          Arn: !GetAtt HealthAlertsFunction.Arn

  GoldRefreshHealthAlertsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HealthAlertsFunction
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GoldRefreshHealthAlertsRule.Arn

  # -------------------------------------------------------
  # EventBridge Rule - Fallback daily at 12:00 PM UTC (7 AM EST)
  # -------------------------------------------------------
  DailyHealthAlertsFallbackRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectPrefix}-daily-health-alerts-fallback'
      Description: Fallback daily health alert in case pipeline did not run overnight
      ScheduleExpression: 'cron(0 12 * * ? *)'
      State: ENABLED
      Targets:
        - Id: HealthAlertsLambdaTarget
          Arn: !GetAtt HealthAlertsFunction.Arn

  DailyHealthAlertsFallbackPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref HealthAlertsFunction
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DailyHealthAlertsFallbackRule.Arn

Outputs:
  HealthAlertsTopicArn:
    Description: SNS topic ARN for health alerts
    Value: !Ref AlertSnsTopicArn
    Export:
      Name: !Sub '${ProjectPrefix}-health-alerts-topic'

  HealthAlertsLambdaArn:
    Description: Health alerts Lambda function ARN
    Value: !GetAtt HealthAlertsFunction.Arn
